<svg width="1280" height="380" viewBox="0 0 1280 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sparkz - start with a spark, not a token">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0b0f"/>
      <stop offset="1" stop-color="#15101d"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.5" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#c084fc" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <style>
      .wm { font-family: 'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 700; }
      .body { font-family: 'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 500; }
      .chip { font-family: 'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 600; letter-spacing: 0.12em; }
    </style>
  </defs>

  <rect width="1280" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="380" rx="20" fill="url(#glow)"/>
  <rect x="1" y="1" width="1278" height="378" rx="19" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- flame -->
  <g transform="translate(150 118) scale(6)">
    <path fill="url(#flame)" fill-rule="evenodd" clip-rule="evenodd"
      d="M12.963 2.286a.75.75 0 0 0-1.071-.136 9.742 9.742 0 0 0-3.539 6.176 7.547 7.547 0 0 1-1.705-1.715.75.75 0 0 0-1.152-.082A9 9 0 1 0 15.68 4.534a7.46 7.46 0 0 1-2.717-2.248ZM15.75 14.25a3.75 3.75 0 1 1-7.313-1.172c.628.465 1.35.81 2.133 1a5.99 5.99 0 0 1 1.925-3.546 3.75 3.75 0 0 1 3.255 3.718Z"/>
  </g>

  <!-- wordmark + copy -->
  <text x="330" y="150" class="wm" font-size="94" fill="url(#spark)">Sparkz</text>
  <text x="332" y="212" class="body" font-size="34" fill="#e7e5e4">Start with a spark, not a token.</text>
  <text x="332" y="256" class="body" font-size="21" fill="#a8a29e">Every project is a Capsule - identity, backing, receipts. The coin is optional, later, if ever.</text>

  <!-- chips -->
  <g transform="translate(332 300)">
    <rect x="0"   y="0" width="132" height="38" rx="19" fill="#ffffff" fill-opacity="0.05" stroke="#c084fc" stroke-opacity="0.4"/>
    <text x="66"  y="25" class="chip" font-size="14" fill="#d8b4fe" text-anchor="middle">CAPSULES</text>
    <rect x="148" y="0" width="168" height="38" rx="19" fill="#ffffff" fill-opacity="0.05" stroke="#f472b6" stroke-opacity="0.4"/>
    <text x="232" y="25" class="chip" font-size="14" fill="#f9a8d4" text-anchor="middle">MEME ENGINE</text>
    <rect x="332" y="0" width="210" height="38" rx="19" fill="#ffffff" fill-opacity="0.05" stroke="#fbbf24" stroke-opacity="0.4"/>
    <text x="437" y="25" class="chip" font-size="14" fill="#fcd34d" text-anchor="middle">FARCASTER-NATIVE</text>
  </g>
</svg>
